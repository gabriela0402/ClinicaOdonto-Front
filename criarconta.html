<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/criarconta.css">
    <title>Odonto Excellence</title>
</head>

<body>
    <header>
        <nav>
            <a class="voltar" href="index.html">Voltar</a>
        </nav>
    </header>
    <main>
        <div class="container">
            <div class="form-entrar">
                <h1>Criar Conta</h1>

                <div class="seletor-tipo">
                    <button type="button" class="btn-opcao ativo" id="btn-paciente">Paciente</button>
                    <button type="button" class="btn-opcao" id="btn-dentista">Dentista</button>
                </div>

                <form action="" id="form-paciente">
                    <p>Nome Completo:</p><input type="text" placeholder="Digite aqui">
                    <p>CPF:</p><input type="number" placeholder="Digite aqui">
                    <p>Telefone</p><input type="number" placeholder="Digite aqui">
                    <p>Email:</p><input type="email" placeholder="Digite aqui">
                    <p>Senha:</p><input type="password" placeholder="Digite aqui">
                    <button type="submit" class="btn-enviar">Enviar</button>
                </form>

                <form action="" id="form-dentista" style="display: none;">
                    <p>Nome Completo:</p><input type="text" placeholder="Digite aqui">
                    <p>Especialização:</p><input type="text" placeholder="Digite aqui">
                    <p>Telefone</p><input type="number" placeholder="Digite aqui">
                    <p>Email:</p><input type="email" placeholder="Digite aqui">
                    <p>Senha:</p><input type="password" placeholder="Digite aqui">
                    <button type="submit" class="btn-enviar">Enviar</button>
                </form>
            </div>

            <div class="mensagem-entrar">
                <h2>Já tem conta?</h2>
                <p>Entre na sua conta para continuar seu acompanhamento odontológico e acessar informações sobre sua saúde bucal.</p>
                <button class="btn-entrar"><a href="login.html">Entrar</a></button>
            </div>
        </div>
    </main>
</body>
<script src="js/script.js"></script>

</html>
